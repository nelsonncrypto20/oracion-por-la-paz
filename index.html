<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oración por la Paz — Turnos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Newsreader:opsz,wght@6..72,400;6..72,500&family=Archivo:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#faf8f3;
    --ink:#1c1b18;
    --grey:#6f6d66;
    --faint:#a6a39a;
    --line:#e2ded3;
    --accent:#2f3e63;
    --display:'Fraunces',Georgia,serif;
    --body:'Newsreader',Georgia,serif;
    --label:'Archivo',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--paper);color:var(--ink);
    font-family:var(--body);font-size:18px;line-height:1.6;
    -webkit-font-smoothing:antialiased;
    padding:clamp(1.5rem,5vw,4rem) clamp(1rem,5vw,2rem);
  }
  .wrap{max-width:980px;margin:0 auto}

  .kicker{
    font-family:var(--label);font-size:12px;font-weight:500;
    letter-spacing:.22em;text-transform:uppercase;color:var(--accent);
    margin-bottom:.6rem;
  }
  h1{
    font-family:var(--display);font-weight:400;
    font-size:clamp(2.6rem,7vw,4.4rem);line-height:1.02;
    letter-spacing:-.01em;margin-bottom:1.1rem;
  }
  .lede{font-size:1.05rem;color:var(--grey);max-width:46ch}
  .rule{height:1px;background:var(--line);margin:2rem 0}

  .meta{
    display:flex;justify-content:space-between;align-items:baseline;
    flex-wrap:wrap;gap:.5rem 1rem;margin-bottom:1.6rem;
  }
  .meta .week{font-family:var(--display);font-size:1.5rem}
  .meta .cover{font-family:var(--label);font-size:13px;color:var(--grey);letter-spacing:.02em}

  .grid{
    display:grid;gap:1px;background:var(--line);
    border:1px solid var(--line);
    grid-template-columns:repeat(auto-fit,minmax(190px,1fr));
  }
  .day{background:var(--paper);padding:1.25rem 1.25rem 1.4rem;display:flex;flex-direction:column;min-height:190px}
  .day h2{
    font-family:var(--display);font-weight:400;font-size:1.35rem;
    display:flex;align-items:baseline;gap:.45rem;
  }
  .day h2 .num{color:var(--accent)}
  .day .status{
    font-family:var(--label);font-size:11px;font-weight:500;
    letter-spacing:.14em;text-transform:uppercase;color:var(--faint);
    margin:.35rem 0 .9rem;
  }
  .day .status.has{color:var(--accent)}
  .names{list-style:none;font-size:.98rem;color:var(--ink);flex:1}
  .names li{padding:.12rem 0;color:var(--ink)}
  .names li .hr{color:var(--faint);font-family:var(--label);font-size:.78rem;margin-right:.4rem}
  .names .empty{color:var(--faint);font-style:italic}

  .join{
    margin-top:.9rem;align-self:flex-start;
    font-family:var(--label);font-size:13px;font-weight:500;
    background:none;border:none;color:var(--accent);cursor:pointer;
    padding:0;border-bottom:1px solid var(--accent);line-height:1.4;
  }
  .join:hover{opacity:.6}

  .form{margin-top:.9rem;display:none;flex-direction:column;gap:.55rem}
  .form.open{display:flex}
  .form label{font-family:var(--label);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--grey)}
  .form input{
    font-family:var(--body);font-size:.95rem;color:var(--ink);
    background:#fff;border:1px solid var(--line);border-radius:0;
    padding:.5rem .6rem;width:100%;
  }
  .form input:focus{outline:none;border-color:var(--accent)}
  .form .row{display:flex;flex-direction:column;gap:.2rem}
  .form .opt{font-family:var(--label);font-size:10px;color:var(--faint);letter-spacing:.08em}
  .form button[type=submit]{
    font-family:var(--label);font-size:13px;font-weight:500;letter-spacing:.04em;
    background:var(--accent);color:var(--paper);border:none;
    padding:.55rem .9rem;cursor:pointer;align-self:flex-start;margin-top:.2rem;
  }
  .form button[type=submit]:disabled{opacity:.5;cursor:default}
  .form .cancel{font-family:var(--label);font-size:12px;color:var(--grey);background:none;border:none;cursor:pointer;text-decoration:underline}

  .note{font-family:var(--label);font-size:12px;color:var(--grey);margin-top:2.2rem;line-height:1.7}
  .banner{
    font-family:var(--label);font-size:12px;letter-spacing:.02em;
    background:#fff;border:1px dashed var(--accent);color:var(--accent);
    padding:.6rem .8rem;margin-bottom:1.6rem;
  }
  .state{font-family:var(--label);font-size:13px;color:var(--grey);padding:2rem 0}
</style>
</head>
<body>
<div class="wrap">
  <div class="kicker">Cadena de oración</div>
  <h1>Oración por la Paz</h1>
  <p class="lede">Cada persona dedica 40 minutos de oración en el día que elige, a la hora que pueda. Anotate cada semana en uno o más días.</p>
  <div class="rule"></div>

  <div id="banner" class="banner" style="display:none"></div>

  <div class="meta">
    <div class="week" id="week">—</div>
    <div class="cover" id="cover"></div>
  </div>

  <div id="board" class="state">Cargando turnos…</div>

  <p class="note" id="note"></p>
</div>

<script>
/* ====== CONFIGURACIÓN ======
   Pegá acá la URL del despliegue de Apps Script (termina en /exec).
   Si lo dejás vacío, la página corre en MODO DEMO con datos de ejemplo. */
const CONFIG = {
  endpoint: "https://script.google.com/macros/s/AKfycbwBIwG1rdlF1FFNyvjiFizMytdlaXtQI7-x1beAmTQu394cROhbILyLvIjyucl9Lfin/exec"
};

const DIAS = ["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];
const TZ = "America/Argentina/Mendoza";

/* ---- fecha de hoy en zona horaria de Mendoza ---- */
function hoyEnTZ(){
  const f = new Intl.DateTimeFormat("en-CA",{timeZone:TZ,year:"numeric",month:"2-digit",day:"2-digit"});
  const [y,m,d] = f.format(new Date()).split("-").map(Number);
  return new Date(Date.UTC(y,m-1,d,12,0,0)); // mediodía UTC para evitar desfases
}
function lunesDeLaSemana(){
  const t = hoyEnTZ();
  const dow = (t.getUTCDay()+6)%7; // 0 = lunes
  t.setUTCDate(t.getUTCDate()-dow);
  return t;
}
function claveFecha(d){
  return d.toISOString().slice(0,10);
}
function diasDeLaSemana(){
  const base = lunesDeLaSemana();
  return Array.from({length:7},(_,i)=>{
    const d = new Date(base); d.setUTCDate(base.getUTCDate()+i);
    return { key:claveFecha(d), etiqueta:DIAS[i], num:d.getUTCDate() };
  });
}
function rangoTexto(dias){
  const meses=["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
  const a=dias[0], b=dias[6];
  const ma=meses[parseInt(a.key.slice(5,7))-1], mb=meses[parseInt(b.key.slice(5,7))-1];
  return ma===mb ? `${a.num} al ${b.num} de ${ma}` : `${a.num} de ${ma} al ${b.num} de ${mb}`;
}

/* ---- datos de ejemplo (modo demo) ---- */
function demoData(){
  const d = diasDeLaSemana();
  return [
    {fecha:d[0].key,nombre:"María L.",hora:"07:00"},
    {fecha:d[0].key,nombre:"Diego R.",hora:"21:00"},
    {fecha:d[1].key,nombre:"Ana M.",hora:"06:30"},
    {fecha:d[2].key,nombre:"Lucía F.",hora:""},
    {fecha:d[4].key,nombre:"Pedro G.",hora:"18:00"},
    {fecha:d[4].key,nombre:"Clara V.",hora:"22:00"},
    {fecha:d[5].key,nombre:"Marcos T.",hora:"09:00"},
  ];
}

let INSCRIPCIONES = [];

async function cargar(){
  if(!CONFIG.endpoint){
    document.getElementById("banner").style.display="block";
    document.getElementById("banner").textContent="Modo demo — configurá CONFIG.endpoint con tu URL de Apps Script para activar las inscripciones reales.";
    INSCRIPCIONES = demoData();
    render();
    return;
  }
  try{
    const r = await fetch(CONFIG.endpoint, {method:"GET"});
    const j = await r.json();
    INSCRIPCIONES = (j.inscripciones||[]);
    render();
  }catch(e){
    document.getElementById("board").innerHTML = '<div class="state">No se pudieron cargar los turnos. Revisá la URL del endpoint.</div>';
  }
}

function render(){
  const dias = diasDeLaSemana();
  document.getElementById("week").textContent = "Semana del "+rangoTexto(dias);

  const cubiertos = dias.filter(d=>INSCRIPCIONES.some(i=>i.fecha===d.key)).length;
  document.getElementById("cover").textContent = `${cubiertos} de 7 días con cobertura`;

  const board = document.getElementById("board");
  board.className = "grid";
  board.innerHTML = "";

  dias.forEach(d=>{
    const gente = INSCRIPCIONES.filter(i=>i.fecha===d.key);
    const card = document.createElement("div");
    card.className = "day";

    const lista = gente.length
      ? gente.map(g=>`<li>${g.hora?`<span class="hr">${g.hora}</span>`:""}${escapeHtml(g.nombre)}</li>`).join("")
      : `<li class="empty">Sin cobertura todavía</li>`;

    card.innerHTML = `
      <h2><span>${d.etiqueta}</span><span class="num">${d.num}</span></h2>
      <div class="status ${gente.length?"has":""}">${gente.length?gente.length+" "+(gente.length===1?"persona":"personas"):"Disponible"}</div>
      <ul class="names">${lista}</ul>
      <button class="join">Sumarme a este día</button>
      <form class="form" data-fecha="${d.key}">
        <div class="row"><label>Nombre</label><input name="nombre" required maxlength="60" placeholder="Tu nombre"></div>
        <div class="row"><label>Email</label><input name="email" type="email" required placeholder="tu@correo.com"></div>
        <div class="row"><label>Hora aproximada <span class="opt">opcional</span></label><input name="hora" type="time"></div>
        <button type="submit">Confirmar</button>
        <button type="button" class="cancel">cancelar</button>
      </form>`;

    const form = card.querySelector("form");
    card.querySelector(".join").addEventListener("click",()=>{
      const open = form.classList.contains("open");
      document.querySelectorAll(".form.open").forEach(f=>f.classList.remove("open"));
      if(!open) form.classList.add("open"), form.querySelector("input").focus();
    });
    card.querySelector(".cancel").addEventListener("click",()=>form.classList.remove("open"));
    form.addEventListener("submit",ev=>enviar(ev,form));

    board.appendChild(card);
  });
}

async function enviar(ev,form){
  ev.preventDefault();
  const btn = form.querySelector("button[type=submit]");
  const datos = {
    fecha: form.dataset.fecha,
    nombre: form.nombre.value.trim(),
    email: form.email.value.trim(),
    hora: form.hora.value || ""
  };
  if(!datos.nombre || !datos.email) return;
  btn.disabled = true; btn.textContent = "Enviando…";

  if(!CONFIG.endpoint){
    INSCRIPCIONES.push(datos); form.classList.remove("open"); render(); return;
  }
  try{
    const params = new URLSearchParams();
    params.append("fecha", datos.fecha);
    params.append("nombre", datos.nombre);
    params.append("email", datos.email);
    params.append("hora", datos.hora);
    await fetch(CONFIG.endpoint,{
      method:"POST",
      body: params   // Content-Type application/x-www-form-urlencoded (sin preflight, sobrevive el redirect)
    });
    INSCRIPCIONES.push({fecha:datos.fecha,nombre:datos.nombre,hora:datos.hora}); // optimista
    form.classList.remove("open");
    render();
  }catch(e){
    btn.disabled=false; btn.textContent="Confirmar";
    alert("No se pudo registrar. Intentá de nuevo.");
  }
}

function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

document.getElementById("note").textContent =
  "Los datos quedan registrados de forma privada. El email solo se usa para recordatorios y nunca aparece en este tablero público.";

cargar();
</script>
</body>
</html>
